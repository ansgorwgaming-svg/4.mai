<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Command Console</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="app">
        <div id="login-screen" class="card" style="max-width: 400px; margin: 100px auto; text-align: center;">
            <div class="imperial-logo"></div>
            <h1 style="color:var(--imp-blue)">IDENTITY CHECK</h1>
            <input type="text" id="username" placeholder="NAME">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="imperial-btn" onclick="login()" style="width:100%">LOGIN</button>
            <p id="login-error" style="color:red; margin-top:10px; font-size: 0.8em;"></p>
        </div>

        <div id="dashboard" class="hidden main-layout">
            
            <aside id="admin-sidebar" class="hidden">
                <div class="sidebar-header">USER MONITOR</div>
                <div id="user-crystal-list"></div>

                <div class="sidebar-header" style="margin-top: 30px; border-color: var(--imp-blue); color: var(--imp-blue);">COMMAND LOG</div>
                <div id="admin-purchase-log" style="font-size: 0.75em; max-height: 40vh; overflow-y: auto; font-family: monospace;"></div>
            </aside>

            <main class="content">
                <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                    <h2 id="user-display" style="color:var(--imp-blue); margin:0;">PILOT</h2>
                    <button onclick="logout()" class="imperial-btn" style="width:auto; padding:5px 15px;">LOGOUT</button>
                </header>

                <div class="card mission-card">
                    <span class="label">ACTIVE MISSION</span>
                    <h1 id="current-game-name" style="margin:10px 0; letter-spacing:3px;">SYSTEM OFFLINE</h1>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:25px;">
                    <div class="card" style="text-align:center;">
                        <span class="label">CRYSTALS</span>
                        <h2 id="crystal-count" class="big-value">0</h2>
                    </div>
                    <div class="card" style="text-align:center;">
                        <span class="label">POINTS</span>
                        <h2 id="total-points" class="big-value">0</h2>
                    </div>
                </div>

                <div id="admin-panel" class="card admin-section hidden">
                    <h2 class="imperial-sub">ADMIN CONTROL</h2>
                    <button id="enable-audio" class="imperial-btn" onclick="activateSystemSounds()" style="background: #222; border-color: gold; margin-bottom: 20px; color: gold;">
                        🔈 SYSTEM SOUNDS AKTIVIEREN
                    </button>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                        <div>
                            <label>MISSION</label>
                            <select id="game-select">
                                <option value="Warten">Auf Start Warten</option>
                                <option value="Lego Star Wars">Lego Star Wars</option>
                                <option value="Battlefront 2017">Battlefront 2017</option>
                                <option value="Jedi Survivor">Jedi Survivor</option>
                                <option value="Star Wars Quiz">Star Wars Quiz</option>
                            </select>
                            <button class="imperial-btn red" onclick="updateGameFromDropdown()">UPDATE</button>
                        </div>
                        <div>
                            <label>TRANSFER</label>
                            <input type="text" id="target-user" placeholder="NAME">
                            <input type="number" id="crystal-amount" placeholder="AMOUNT">
                            <button class="imperial-btn" onclick="addCrystalCustom()">SEND</button>
                        </div>
                    </div>
                    <div style="margin-top:20px; border-top:1px solid #333; pt:15px;">
                        <label>NEW SHOP ITEM</label>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="item-name" placeholder="ITEM">
                            <input type="number" id="item-price" placeholder="PRICE">
                        </div>
                        <button class="imperial-btn red" onclick="addShopItem()">ADD TO SHOP</button>
                    </div>
                </div>

                <div class="card">
                    <h2 class="imperial-sub">ARMORY / SHOP</h2>
                    <div id="shop-items" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:15px;"></div>
                </div>

                <div class="card">
                    <h2 class="imperial-sub">RANKING</h2>
                    <ul id="leaderboard" style="list-style:none; padding:0;"></ul>
                </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
