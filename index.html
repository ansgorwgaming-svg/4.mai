<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Command Console</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="app">
        <div id="login-screen" class="card" style="max-width: 400px; margin: 100px auto; text-align: center;">
            <div class="imperial-logo"></div>
            <h1 style="color:var(--imp-blue)">IDENTITY CHECK</h1>
            <input type="text" id="username" placeholder="NAME">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="imperial-btn" onclick="login()" style="width:100%">LOGIN</button>
            <p id="login-error" class="error-text" style="color:red; margin-top:10px;"></p>
        </div>

        <div id="dashboard" class="hidden main-layout">
            
            <aside id="admin-sidebar" class="hidden">
                <div class="sidebar-header">USER MONITOR</div>
                <div id="user-crystal-list"></div>
            </aside>

            <main class="content">
                <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                    <h2 id="user-display" style="color:var(--imp-blue); margin:0;">PILOT</h2>
                    <button onclick="logout()" class="imperial-btn" style="padding:5px 15px; border-color:#444;">LOGOUT</button>
                </header>

                <div class="card mission-card">
                    <span class="label">ACTIVE MISSION</span>
                    <h1 id="current-game-name" style="margin:10px 0; letter-spacing:3px; color:white;">SYSTEM OFFLINE</h1>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:25px;">
                    <div class="card" style="margin:0; text-align:center;">
                        <span class="label">CRYSTALS</span>
                        <h2 id="crystal-count" class="big-value">0</h2>
                    </div>
                    <div class="card" style="margin:0; text-align:center;">
                        <span class="label">POINTS</span>
                        <h2 id="total-points" class="big-value">0</h2>
                    </div>
                </div>

                <div id="admin-panel" class="card admin-section hidden">
                    <h2 class="imperial-sub">ADMIN CONTROL PANEL</h2>
                    
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                        <div>
                            <label>SET ACTIVE GAME</label>
                            <select id="game-select">
                                <option value="Lego Star Wars">Lego Star Wars</option>
                                <option value="Battlefront 2017">Battlefront 2017</option>
                                <option value="Battlefront 2005">Battlefront 2005</option>
                                <option value="Squadrons">Squadrons</option>
                            </select>
                            <button class="imperial-btn red" onclick="updateGameFromDropdown()" style="width:100%">UPDATE GAME</button>
                        </div>
                        <div>
                            <label>QUICK CRYSTAL TRANSFER</label>
                            <input type="text" id="target-user" placeholder="USER NAME">
                            <input type="number" id="crystal-amount" placeholder="AMOUNT (e.g. 10)">
                            <button class="imperial-btn" onclick="addCrystalCustom()" style="width:100%">EXECUTE</button>
                        </div>
                    </div>

                    <div style="border-top: 1px solid var(--imp-border); margin-top: 25px; padding-top: 20px;">
                        <label>ADD NEW SHOP ITEM (FOR CURRENT GAME)</label>
                        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                            <input type="text" id="item-name" placeholder="ITEM NAME">
                            <input type="number" id="item-price" placeholder="PRICE">
                        </div>
                        <button class="imperial-btn red" onclick="addShopItem()" style="width:100%">REGISTER ITEM</button>
                    </div>
                </div>

                <div class="card">
                    <h2 class="imperial-sub">ARMORY / SHOP</h2>
                    <div id="shop-items" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
                </div>

                <div class="card">
                    <h2 class="imperial-sub">GLOBAL RANKING</h2>
                    <ul id="leaderboard" style="list-style:none; padding:0;"></ul>
                </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
